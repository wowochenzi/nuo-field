<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>壁画交互 - GLB火把模型版</title>
    <script type="importmap">
      {
        "imports": {
          "three": "../assets/vendor/three/build/three.module.js",
          "three/addons/": "../assets/vendor/three/examples/jsm/"
        }
      }
    </script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        #webgl-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #preview-canvas {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 320px;
            height: 240px;
            z-index: 2;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
            background-color: #111;
            transform: scaleX(-1);
            display: none;
        }
        .hidden-element {
            display: none;
        }
        #status-text {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            z-index: 3;
            font-family: sans-serif;
            pointer-events: none;
            text-shadow: 1px 1px 2px #000;
        }
        #pickup-hint {
            position: absolute;
            left: 50%;
            top: calc(50% + 170px);
            transform: translateX(-50%);
            color: rgba(255, 232, 184, 0.68);
            z-index: 4;
            font: 13px/1.4 "Microsoft YaHei", "PingFang SC", sans-serif;
            letter-spacing: 0.04em;
            pointer-events: none;
            text-shadow: 0 0 8px rgba(255, 160, 72, 0.35), 0 1px 2px rgba(0, 0, 0, 0.8);
            opacity: 1;
            transition: opacity 1.1s ease;
            animation: hintBreath 2.8s ease-in-out infinite;
        }
        #pickup-hint.hidden {
            opacity: 0;
            animation: none;
        }
        #blackout-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            transition: opacity 1s ease;
        }
        #blackout-overlay.active {
            opacity: 1;
        }
        @keyframes hintBreath {
            0%, 100% { opacity: 0.42; }
            50% { opacity: 0.74; }
        }
    </style>
</head>
<body>
    <div id="status-text">正在加载手势模型与3D资源...</div>
    <div id="webgl-container"></div>
    <div id="pickup-hint">请伸手拾取火把</div>
    <div id="blackout-overlay"></div>
    <canvas id="preview-canvas" width="320" height="240"></canvas>
    
    <video id="input-video" class="hidden-element" autoplay playsinline></video>
    <video id="mural-video" class="hidden-element" src="../assets/mural/flashlight-effect.mp4" loop muted autoplay playsinline></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const statusText = document.getElementById('status-text');
        const pickupHint = document.getElementById('pickup-hint');
        const blackoutOverlay = document.getElementById('blackout-overlay');
        const journeyParams = new URLSearchParams(window.location.search);
        const isJourneyMode = journeyParams.get('journey') === '1' && window.parent !== window;

        function notifyJourney(type) {
            if (isJourneyMode) {
                window.parent.postMessage({ type }, '*');
            }
        }

        // ==========================================
        // 1. 场景、透视相机与光照
        // ==========================================
        const scene = new THREE.Scene();
        // 增加环境光照亮模型本体
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        // 添加一个平行光，让火把材质有更好的立体感和阴影过渡
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 5000);
        scene.add(camera);

        const raycaster = new THREE.Raycaster();
        const currentMouse = new THREE.Vector2(0, 0);
        const targetMouse = new THREE.Vector2(0, 0);
        let isHandDetected = false;
        let hasPickedTorch = false;
        let pickedStartTime = null;
        let windSequenceStarted = false;
        let windStartTime = null;
        let flameExtinguished = false;
        let blackoutStarted = false;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        // 开启颜色空间校正，让模型与视频壁画的色彩更稳定。
        if ('outputColorSpace' in renderer && THREE.SRGBColorSpace) {
            renderer.outputColorSpace = THREE.SRGBColorSpace;
        }
        document.getElementById('webgl-container').appendChild(renderer.domElement);

        // ==========================================
        // 2. 加载外部 GLB 模型
        // ==========================================
        const torchGroup = new THREE.Group();
        camera.add(torchGroup); // 依然挂载在相机前方

        // 2.1 隐形射线发射点（火苗尖端）
        const torchTip = new THREE.Object3D();
        // 【注意参数】这里的 Y 轴高度取决于你加载的模型有多高
        torchTip.position.y = 0.2; 
        torchGroup.add(torchTip);

        // 2.2 照亮壁画与火把的点光源 (暖橘色火光)
        const torchLight = new THREE.PointLight(0xff7700, 2.0, 3.0);
        // 光源稍微比火苗尖端高一点点
        torchLight.position.y = 0.25; 
        torchGroup.add(torchLight);

        // 2.3 使用 GLTFLoader 加载 torch.glb
        const gltfLoader = new GLTFLoader();
        gltfLoader.load('../assets/mural/torch.glb', 
            (gltf) => {
                const torchModel = gltf.scene;
                
                // 【注意参数】你大概率需要在这里调整模型的缩放比例
                // 大部分网上的模型导入后会过大或过小
                torchModel.scale.set(0.35, 0.35, 0.35); 
                
                // 【注意参数】调整模型的位置，让手柄的中心对准 torchGroup 的原点
                torchModel.position.set(0, 0.03, 0); 
                
                // 如果模型导入后是倒着的或侧着的，可以解开下方注释调整旋转：
                // torchModel.rotation.x = Math.PI / 2;
                
                torchGroup.add(torchModel);
                console.log("火把 GLB 模型加载成功");
            },
            undefined,
            (err) => {
                console.error("加载 torch.glb 失败，请检查文件路径", err);
                statusText.innerText = "警告：找不到 torch.glb 模型文件";
            }
        );

        // ==========================================
        // 3. 加载壁画纹理与着色器
        // ==========================================
        let imageAspect = 1.0; 
        const textureLoader = new THREE.TextureLoader();
        const muralImgTexture = textureLoader.load('../assets/mural/ancient-mural.png', 
            (tex) => {
                imageAspect = tex.image.width / tex.image.height;
                updateLayout(); 
            },
            undefined,
            (err) => { statusText.innerText = "错误：找不到 ancient-mural.png 文件"; }
        );

        const videoElement = document.getElementById('mural-video');
        videoElement.muted = true;
        videoElement.loop = true;
        videoElement.playsInline = true;
        videoElement.load();

        function playMuralVideo() {
            const attempt = videoElement.play();
            if (attempt?.catch) {
                attempt.catch(() => {
                    statusText.innerText = "点击或移动后点亮动态壁画";
                });
            }
        }

        playMuralVideo();
        const muralVidTexture = new THREE.VideoTexture(videoElement);
        muralVidTexture.minFilter = THREE.LinearFilter;
        muralVidTexture.magFilter = THREE.LinearFilter;
        muralVidTexture.generateMipmaps = false;
        if ('colorSpace' in muralVidTexture && THREE.SRGBColorSpace) {
            muralVidTexture.colorSpace = THREE.SRGBColorSpace;
        }
        videoElement.addEventListener('loadeddata', () => {
            muralVidTexture.needsUpdate = true;
        });
        videoElement.addEventListener('play', () => {
            muralVidTexture.needsUpdate = true;
        });

        const uniforms = {
            u_muralImage: { value: muralImgTexture },
            u_muralVideo: { value: muralVidTexture },
            u_lightPos: { value: new THREE.Vector2(-2.0, -2.0) },
            u_planeSize: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
        };

        const material = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec2 vUv;
                uniform sampler2D u_muralImage;
                uniform sampler2D u_muralVideo;
                uniform vec2 u_lightPos;
                uniform vec2 u_planeSize;

                void main() {
                    vec2 pixelUv = vUv * u_planeSize;
                    vec2 pixelLight = u_lightPos * u_planeSize;
                    
                    float dist = distance(pixelUv, pixelLight);
                    
                    float maskRadius = u_planeSize.x * 0.16; 
                    float circleMask = 1.0 - smoothstep(maskRadius * 0.15, maskRadius * 1.5, dist);
                    float outerDarkness = smoothstep(maskRadius * 0.85, maskRadius * 2.45, dist);
                    float farVignette = smoothstep(maskRadius * 1.65, maskRadius * 3.3, dist);
                    
                    vec4 staticImgColor = texture2D(u_muralImage, vUv);
                    vec4 dynamicVidColor = texture2D(u_muralVideo, vUv);
                    
                    vec4 redTint = vec4(1.0, 0.0, 0.0, 1.0);
                    vec4 tintedVidColor = mix(dynamicVidColor, redTint, 0.12);
                    tintedVidColor.rgb *= 1.14;
                    
                    vec4 animatedBaseColor = mix(staticImgColor, dynamicVidColor, 0.32);
                    vec4 darkenedImgColor = vec4(animatedBaseColor.rgb * 0.46, 1.0);
                    vec4 revealColor = mix(darkenedImgColor, tintedVidColor, circleMask);
                    float darknessOverlay = mix(1.0, 0.48, outerDarkness) * mix(1.0, 0.78, farVignette);
                    
                    gl_FragColor = vec4(revealColor.rgb * darknessOverlay, 1.0);
                }
            `
        });

        const geometry = new THREE.PlaneGeometry(1, 1);
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        function createFlameTexture(kind = 'outer') {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const offset = kind === 'side' ? 24 : 0;
            const narrow = kind === 'inner';
            const alphaScale = kind === 'inner' ? 0.7 : (kind === 'side' ? 0.62 : 1.0);
            const image = ctx.createImageData(canvas.width, canvas.height);
            const data = image.data;
            const phase = kind === 'side' ? 1.9 : (kind === 'inner' ? 0.8 : 0.15);
            const baseWidth = narrow ? 0.16 : (kind === 'side' ? 0.2 : 0.42);
            const sideOffset = kind === 'side' ? 0.075 : 0.0;

            function smoothstep(edge0, edge1, x) {
                const t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
                return t * t * (3 - 2 * t);
            }

            for (let y = 0; y < canvas.height; y++) {
                const v = 1 - y / (canvas.height - 1);
                const tipFade = 1 - smoothstep(0.82, 1.0, v);
                const taper = Math.pow(Math.max(0, 1 - v), narrow ? 0.78 : 0.64);
                const curl = sideOffset + Math.sin(v * 5.8 + phase) * 0.045 * v + Math.sin(v * 12.0 + phase) * 0.012 * v;
                const width = (baseWidth * taper * (0.9 + Math.sin(v * 7.0 + phase) * 0.08)) + 0.018 * (1 - v);

                for (let x = 0; x < canvas.width; x++) {
                    const u = x / (canvas.width - 1) - 0.5;
                    const d = Math.abs(u - curl);
                    const shape = 1 - smoothstep(width * 0.55, width, d);
                    if (shape <= 0) continue;

                    const core = 1 - smoothstep(width * 0.08, width * 0.42, d);
                    const edge = smoothstep(width * 0.36, width, d);
                    const raggedRoot = 0.018
                        + 0.018 * (0.5 + 0.5 * Math.sin((u + phase) * 35.0))
                        + 0.012 * (0.5 + 0.5 * Math.sin((u - phase) * 73.0));
                    const rootFade = smoothstep(raggedRoot, raggedRoot + 0.14, v);
                    const heat = Math.max(0, Math.min(1, shape * rootFade * tipFade));
                    const alpha = Math.pow(heat, 1.15) * alphaScale * (0.42 + core * 0.58);
                    const i = (y * canvas.width + x) * 4;

                    data[i] = 255;
                    data[i + 1] = Math.round(58 + core * 155 + (1 - edge) * 125);
                    data[i + 2] = Math.round(4 + core * 92 + (1 - v) * 22);
                    data[i + 3] = Math.round(Math.min(1, alpha) * 255);
                }
            }

            ctx.putImageData(image, 0, 0);

            const texture = new THREE.CanvasTexture(canvas);
            texture.minFilter = THREE.LinearFilter;
            texture.magFilter = THREE.LinearFilter;
            texture.wrapS = THREE.ClampToEdgeWrapping;
            texture.wrapT = THREE.ClampToEdgeWrapping;
            texture.generateMipmaps = false;
            return texture;
        }

        function createEmberTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 64, 64);

            const glow = ctx.createRadialGradient(32, 32, 0, 32, 32, 30);
            glow.addColorStop(0.0, 'rgba(255, 245, 185, 1)');
            glow.addColorStop(0.35, 'rgba(255, 142, 24, 0.72)');
            glow.addColorStop(1.0, 'rgba(255, 90, 0, 0)');
            ctx.fillStyle = glow;
            ctx.fillRect(0, 0, 64, 64);

            const texture = new THREE.CanvasTexture(canvas);
            texture.minFilter = THREE.LinearFilter;
            texture.magFilter = THREE.LinearFilter;
            texture.wrapS = THREE.ClampToEdgeWrapping;
            texture.wrapT = THREE.ClampToEdgeWrapping;
            texture.generateMipmaps = false;
            return texture;
        }

        const fireGroup = new THREE.Group();
        fireGroup.position.set(0, -0.06, 0);
        torchTip.add(fireGroup);

        function createFlameSprite(texture, opacity, scaleX, scaleY, x = 0, y = -0.012) {
            const material = new THREE.SpriteMaterial({
                map: texture,
                color: 0xffffff,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                alphaTest: 0.02,
                opacity
            });
            const sprite = new THREE.Sprite(material);
            sprite.center.set(0.5, 0.08);
            sprite.position.set(x, y, 0);
            sprite.scale.set(scaleX, scaleY, 1);
            fireGroup.add(sprite);
            return sprite;
        }

        const mainFlame = createFlameSprite(createFlameTexture('outer'), 0.92, 0.18, 0.19);
        const innerFlame = createFlameSprite(createFlameTexture('inner'), 0.58, 0.07, 0.145, 0.002, -0.01);
        const sideFlame = createFlameSprite(createFlameTexture('side'), 0.48, 0.09, 0.13, 0.017, -0.006);

        const fireParticleCount = 34;
        const fireGeometry = new THREE.BufferGeometry();
        const firePositions = new Float32Array(fireParticleCount * 3);
        const fireSizes = new Float32Array(fireParticleCount);
        const fireLifetimes = new Float32Array(fireParticleCount);
        const fireOffsets = new Float32Array(fireParticleCount);
        const fireAngles = new Float32Array(fireParticleCount);
        const fireSpreads = new Float32Array(fireParticleCount);

        for (let i = 0; i < fireParticleCount; i++) {
            firePositions[i * 3 + 1] = -999;
            fireLifetimes[i] = Math.random();
            fireSizes[i] = Math.random() * 0.012 + 0.006;
            fireOffsets[i] = Math.random() * 100;
            fireAngles[i] = Math.random() * Math.PI * 2;
            fireSpreads[i] = Math.pow(Math.random(), 0.55);
        }

        fireGeometry.setAttribute('position', new THREE.BufferAttribute(firePositions, 3));
        fireGeometry.setAttribute('size', new THREE.BufferAttribute(fireSizes, 1));
        fireGeometry.setAttribute('lifetime', new THREE.BufferAttribute(fireLifetimes, 1));
        fireGeometry.setAttribute('offset', new THREE.BufferAttribute(fireOffsets, 1));

        const fireMaterial = new THREE.ShaderMaterial({
            uniforms: {
                pointTexture: { value: createEmberTexture() }
            },
            vertexShader: `
                attribute float size;
                attribute float lifetime;
                varying float vLifetime;
                void main() {
                    vLifetime = lifetime;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    float sizeModifier = mix(1.0, 0.25, vLifetime);
                    gl_PointSize = size * sizeModifier * (120.0 / max(0.35, -mvPosition.z));
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform sampler2D pointTexture;
                varying float vLifetime;
                void main() {
                    vec2 uv = gl_PointCoord - vec2(0.5);
                    float dist = length(uv);

                    vec3 coreColor = vec3(1.0, 0.9, 0.45);
                    vec3 midColor = vec3(1.0, 0.42, 0.05);
                    vec3 edgeColor = vec3(0.7, 0.08, 0.0);

                    vec3 ageColor = mix(midColor, edgeColor, smoothstep(0.35, 1.0, vLifetime));
                    float coreIntensity = smoothstep(0.28, 0.0, dist) * (1.0 - vLifetime * 0.75);
                    vec3 finalColor = mix(ageColor, coreColor, coreIntensity);

                    float texAlpha = texture2D(pointTexture, gl_PointCoord).a;
                    float fadeIn = smoothstep(0.0, 0.15, vLifetime);
                    float fadeOut = smoothstep(1.0, 0.48, vLifetime);
                    float finalAlpha = texAlpha * fadeIn * fadeOut * 0.55;
                    if (finalAlpha < 0.02) discard;

                    gl_FragColor = vec4(finalColor * finalAlpha, finalAlpha);
                }
            `,
            blending: THREE.AdditiveBlending,
            depthTest: true,
            depthWrite: false,
            transparent: true,
            alphaTest: 0.02
        });

        const fireParticles = new THREE.Points(fireGeometry, fireMaterial);
        fireParticles.position.set(0, 0, 0);
        fireParticles.frustumCulled = false;
        fireGroup.add(fireParticles);

        const fireClock = new THREE.Clock();
        const fireEmitterWorldPos = new THREE.Vector3();
        const emberHeight = 0.16;
        const emberBaseRadius = 0.03;
        const previousMouse = currentMouse.clone();
        const flameMotionTarget = new THREE.Vector2();
        const flameInertia = new THREE.Vector2();
        const windState = {
            instability: 0,
            gust: 0,
            extinguish: 0
        };

        function clamp01(value) {
            return Math.max(0, Math.min(1, value));
        }

        function easeInOut(value) {
            const t = clamp01(value);
            return t * t * (3 - 2 * t);
        }

        function updateWindSequence(time) {
            windState.instability = 0;
            windState.gust = 0;
            windState.extinguish = flameExtinguished ? 1 : 0;

            if (hasPickedTorch && !windSequenceStarted && pickedStartTime !== null && time - pickedStartTime >= 6.0) {
                windSequenceStarted = true;
                windStartTime = time;
            }

            if (!windSequenceStarted || windStartTime === null) return;

            const elapsed = time - windStartTime;
            if (elapsed < 1.0) {
                windState.instability = easeInOut(elapsed / 1.0);
                windState.gust = windState.instability * 0.18;
            } else if (elapsed < 3.0) {
                windState.instability = 1;
                windState.gust = easeInOut((elapsed - 1.0) / 2.0);
            } else if (elapsed < 4.25) {
                const out = easeInOut((elapsed - 3.0) / 1.25);
                windState.instability = 1;
                windState.gust = 1.0 - out * 0.25;
                windState.extinguish = out;
            } else {
                windState.instability = 1;
                windState.gust = 0;
                windState.extinguish = 1;
                flameExtinguished = true;
                fireGroup.visible = false;
                torchLight.intensity = 0;
                torchLight.distance = 0;
                uniforms.u_lightPos.value.set(-2.0, -2.0);
                if (!blackoutStarted) {
                    blackoutStarted = true;
                    blackoutOverlay.classList.add('active');
                    notifyJourney('nuo-mural-blackout');
                }
            }
        }

        function resetFireParticle(index) {
            fireAngles[index] = Math.random() * Math.PI * 2;
            fireSpreads[index] = Math.pow(Math.random(), 0.55);
            fireOffsets[index] = Math.random() * 100;
            fireLifetimes[index] = Math.random() * 0.08;
        }

        function updateFireParticles(delta, time, shouldEmit, inertiaX, wind) {
            for (let i = 0; i < fireParticleCount; i++) {
                const i3 = i * 3;
                if (!shouldEmit || flameExtinguished) {
                    firePositions[i3 + 1] = -999;
                    fireLifetimes[i] = Math.random();
                    continue;
                }

                fireLifetimes[i] += delta * (0.95 + wind.gust * 1.45 + wind.extinguish * 2.2 + Math.sin(time * 2.0 + fireOffsets[i]) * 0.12);

                if (fireLifetimes[i] >= 1.0) {
                    if (wind.extinguish > 0.35) {
                        firePositions[i3 + 1] = -999;
                        continue;
                    }
                    resetFireParticle(i);
                }

                const t = fireLifetimes[i];
                const taper = Math.pow(Math.max(0, 1.0 - t), 1.2);
                const radius = emberBaseRadius * taper * fireSpreads[i];
                const angle = fireAngles[i] + Math.sin(time * 2.2 + fireOffsets[i]) * 0.28;
                const windPush = Math.sin(time * 2.4 + fireOffsets[i] + t * 4.0) * 0.016 * t + inertiaX * 0.055 * t - wind.gust * 0.09 * t;
                const flickerY = Math.sin(time * 7.0 + fireOffsets[i]) * 0.004 * (1.0 - t);

                firePositions[i3] = Math.cos(angle) * radius + windPush;
                firePositions[i3 + 1] = 0.055 + t * emberHeight * (1.0 + wind.gust * 0.42) + flickerY;
                firePositions[i3 + 2] = Math.sin(angle) * radius * 0.45;
                fireSizes[i] = (0.006 + (1.0 - t) * 0.015) * (0.9 + Math.sin(time * 8.0 + fireOffsets[i]) * 0.08) * (1.0 + wind.instability * 0.35) * (1.0 - wind.extinguish * 0.65);
            }

            fireGeometry.attributes.position.needsUpdate = true;
            fireGeometry.attributes.lifetime.needsUpdate = true;
            fireGeometry.attributes.size.needsUpdate = true;
        }

        function updateFlameSprites(time, shouldShow, inertiaX, inertiaY, wind) {
            const flamePower = Math.max(0, 1.0 - wind.extinguish);
            fireGroup.visible = shouldShow && flamePower > 0.02;
            if (!fireGroup.visible) return;

            const gustLean = -wind.gust * (0.16 + Math.sin(time * 15.0) * 0.035);
            const movementLean = Math.max(-0.18, Math.min(0.12, inertiaX * 0.72 + gustLean));
            const movementStretch = Math.max(0, Math.min(0.035, Math.abs(inertiaY) * 0.32 + Math.abs(inertiaX) * 0.18));
            const lean = Math.sin(time * (3.0 + wind.instability * 1.6)) * (0.024 + wind.instability * 0.028) + movementLean;
            const slowFlicker = Math.sin(time * (7.3 + wind.instability * 3.0)) * (0.04 + wind.instability * 0.018);
            const fastFlicker = Math.sin(time * (13.7 + wind.gust * 8.0)) * (0.025 + wind.gust * 0.045);
            const windStretch = wind.gust * 0.08 - wind.extinguish * 0.12;
            const windNarrow = 1.0 - wind.gust * 0.36 - wind.extinguish * 0.68;

            mainFlame.position.x = lean * 0.18;
            mainFlame.material.rotation = lean;
            mainFlame.scale.set((0.18 + slowFlicker * 0.36 + Math.abs(movementLean) * 0.12) * Math.max(0.18, windNarrow), Math.max(0.01, 0.19 + fastFlicker * 0.55 + movementStretch + windStretch) * flamePower, 1);
            mainFlame.material.opacity = (0.86 + Math.sin(time * (11.0 + wind.instability * 8.0)) * (0.05 + wind.gust * 0.16)) * flamePower;

            innerFlame.position.x = -lean * 0.08 + Math.sin(time * 5.8 + 0.7) * 0.003;
            innerFlame.material.rotation = -lean * 1.55 + Math.sin(time * 8.0) * 0.018;
            innerFlame.scale.set((0.07 + fastFlicker * 0.15) * Math.max(0.16, windNarrow), Math.max(0.01, 0.145 + slowFlicker * 0.28 + movementStretch * 0.6 + windStretch * 0.65) * flamePower, 1);
            innerFlame.material.opacity = (0.52 + Math.sin(time * (15.0 + wind.gust * 10.0) + 1.1) * (0.05 + wind.gust * 0.14)) * flamePower;

            sideFlame.position.x = 0.017 + Math.sin(time * 4.4 + 1.7) * 0.006 + movementLean * 0.18;
            sideFlame.material.rotation = -0.1 + Math.sin(time * 5.1 + 0.8) * 0.05 + movementLean * 0.55;
            sideFlame.scale.set((0.085 + Math.sin(time * 8.2) * 0.008) * Math.max(0.16, windNarrow), Math.max(0.01, 0.125 + Math.sin(time * 6.4 + 2.0) * 0.012 + movementStretch * 0.45 + windStretch * 0.45) * flamePower, 1);
            sideFlame.material.opacity = (0.42 + Math.sin(time * 9.5 + 2.0) * (0.05 + wind.gust * 0.1)) * flamePower;
        }

        // ==========================================
        // 4. 布局推算与视差计算
        // ==========================================
        let planeWidth = window.innerWidth;
        let planeHeight = window.innerHeight;

        function updateLayout() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            camera.aspect = width / height;
            camera.updateProjectionMatrix();

            const cameraZ = (height / 2) / Math.tan((camera.fov * Math.PI / 180) / 2);
            camera.position.z = cameraZ;
            
            renderer.setSize(width, height);

            planeWidth = width * 1.1; 
            planeHeight = planeWidth / imageAspect;

            mesh.scale.set(planeWidth, planeHeight, 1);
            uniforms.u_planeSize.value.set(planeWidth, planeHeight);
        }
        window.addEventListener('resize', updateLayout);
        updateLayout();

        // ==========================================
        // 5. 动画、手势坐标平滑与完美对齐
        // ==========================================
        let cameraTargetY = 0, cameraTargetRotX = 0;
        let cameraTargetX = 0, cameraTargetRotY = 0;
        const TORCH_Z_DEPTH = -1.0; 

        function animate() {
            requestAnimationFrame(animate);
            const fireDelta = Math.min(fireClock.getDelta(), 0.033);
            const fireTime = fireClock.getElapsedTime();
            if (videoElement.readyState >= HTMLMediaElement.HAVE_CURRENT_DATA) {
                muralVidTexture.needsUpdate = true;
            }
            updateWindSequence(fireTime);

            camera.position.y += (cameraTargetY - camera.position.y) * 0.05;
            camera.rotation.x += (cameraTargetRotX - camera.rotation.x) * 0.05;
            camera.position.x += (cameraTargetX - camera.position.x) * 0.05;
            camera.rotation.y += (cameraTargetRotY - camera.rotation.y) * 0.05;

            currentMouse.lerp(targetMouse, 0.12);
            flameMotionTarget.set(
                previousMouse.x - currentMouse.x,
                previousMouse.y - currentMouse.y
            );
            previousMouse.copy(currentMouse);
            flameInertia.lerp(flameMotionTarget, 0.16);

            const vFov = camera.fov * Math.PI / 180;
            const visibleHeight = 2 * Math.tan(vFov / 2) * Math.abs(TORCH_Z_DEPTH);
            const visibleWidth = visibleHeight * camera.aspect;

            torchGroup.position.set(
                currentMouse.x * (visibleWidth / 2) * 1.3,
                currentMouse.y * (visibleHeight / 2) * 1.3,
                TORCH_Z_DEPTH
            );
            
            torchGroup.rotation.x = -0.15 + (currentMouse.y * 0.1); 
            torchGroup.rotation.y = currentMouse.x * 0.15;
            torchGroup.rotation.z = -currentMouse.x * 0.1;

            torchTip.getWorldPosition(fireEmitterWorldPos);
            const flameActive = currentMouse.y > -1.5 && !flameExtinguished;
            updateFireParticles(fireDelta, fireTime, flameActive, flameInertia.x, windState);
            updateFlameSprites(fireTime, flameActive, flameInertia.x, flameInertia.y, windState);
            const lightPower = Math.max(0, 1.0 - windState.extinguish);
            torchLight.intensity = (1.65 + Math.sin(fireTime * (12.0 + windState.instability * 6.0)) * (0.18 + windState.gust * 0.32) + Math.sin(fireTime * 21.0) * 0.08) * lightPower;
            torchLight.distance = (2.35 + Math.sin(fireTime * 8.0) * 0.12 + windState.gust * 0.35) * lightPower;

            const tipWorldPos = fireEmitterWorldPos.clone();
            tipWorldPos.project(camera); 

            raycaster.setFromCamera(new THREE.Vector2(tipWorldPos.x, tipWorldPos.y), camera);
            const intersects = raycaster.intersectObject(mesh);
            
            if (intersects.length > 0 && flameActive) {
                uniforms.u_lightPos.value.copy(intersects[0].uv);
            } else {
                uniforms.u_lightPos.value.set(-2.0, -2.0); 
            }

            renderer.render(scene, camera);
        }
        animate();

        // ==========================================
        // 6. MediaPipe 手势处理
        // ==========================================
        const inputVideoElement = document.getElementById('input-video');
        const canvasElement = document.getElementById('preview-canvas');
        const canvasCtx = canvasElement.getContext('2d');

        const HAND_CONNECTIONS = [
            [0,1], [1,2], [2,3], [3,4], [0,5], [5,6], [6,7], [7,8],
            [5,9], [9,10], [10,11], [11,12], [9,13], [13,14], [14,15], [15,16],
            [13,17], [17,18], [18,19], [19,20], [0,17]
        ];

        function onResults(results) {
            if (statusText.style.display !== 'none' && !statusText.innerText.includes("错误") && !statusText.innerText.includes("警告")) {
                statusText.style.display = 'none';
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.image) {
                canvasCtx.filter = 'blur(12px)';
                canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
                canvasCtx.filter = 'none';
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                isHandDetected = true;
                if (!hasPickedTorch) {
                    hasPickedTorch = true;
                    pickedStartTime = fireClock.getElapsedTime();
                    pickupHint.classList.add('hidden');
                    notifyJourney('nuo-mural-torch-picked');
                }
                const landmarks = results.multiHandLandmarks[0];

                canvasCtx.strokeStyle = '#00ffcc';
                canvasCtx.lineWidth = 3;
                canvasCtx.beginPath();
                for (const [start, end] of HAND_CONNECTIONS) {
                    const p1 = landmarks[start];
                    const p2 = landmarks[end];
                    canvasCtx.moveTo(p1.x * canvasElement.width, p1.y * canvasElement.height);
                    canvasCtx.lineTo(p2.x * canvasElement.width, p2.y * canvasElement.height);
                }
                canvasCtx.stroke();
                canvasCtx.fillStyle = '#ffffff';
                for (const p of landmarks) {
                    canvasCtx.beginPath();
                    canvasCtx.arc(p.x * canvasElement.width, p.y * canvasElement.height, 4, 0, 2 * Math.PI);
                    canvasCtx.fill();
                }

                const palm = landmarks[9];
                const ndcX = (1.0 - palm.x - 0.5) * 2.0; 
                const ndcY = ((1.0 - palm.y) - 0.5) * 2.0; 
                targetMouse.set(ndcX, ndcY);

                const maxPanY = Math.max(0, (planeHeight - window.innerHeight) / 2);
                cameraTargetY = targetMouse.y * maxPanY * 0.65; 
                cameraTargetRotX = targetMouse.y * 0.12;        
                const maxPanX = Math.max(0, (planeWidth - window.innerWidth) / 2);
                cameraTargetX = targetMouse.x * maxPanX * 0.5;  
                cameraTargetRotY = -targetMouse.x * 0.05;       
            } else {
                isHandDetected = false;
                cameraTargetY = 0; cameraTargetRotX = 0;
                cameraTargetX = 0; cameraTargetRotY = 0;
                if (!hasPickedTorch) {
                    targetMouse.set(0, 0);
                }
            }
            canvasCtx.restore();
        }

        function pickTorchByFallback() {
            if (!hasPickedTorch) {
                hasPickedTorch = true;
                pickedStartTime = fireClock.getElapsedTime();
                pickupHint.classList.add('hidden');
                notifyJourney('nuo-mural-torch-picked');
            }
        }

        function enablePointerFallback() {
            statusText.innerText = "手势模型不可用，请用鼠标或触摸拾取火把";
            window.addEventListener('pointermove', (event) => {
                const ndcX = (event.clientX / window.innerWidth - 0.5) * 2.0;
                const ndcY = ((1.0 - event.clientY / window.innerHeight) - 0.5) * 2.0;
                targetMouse.set(ndcX, ndcY);

                const maxPanY = Math.max(0, (planeHeight - window.innerHeight) / 2);
                cameraTargetY = targetMouse.y * maxPanY * 0.65;
                cameraTargetRotX = targetMouse.y * 0.12;
                const maxPanX = Math.max(0, (planeWidth - window.innerWidth) / 2);
                cameraTargetX = targetMouse.x * maxPanX * 0.5;
                cameraTargetRotY = -targetMouse.x * 0.05;
            }, { passive: true });
            window.addEventListener('pointerdown', () => {
                pickTorchByFallback();
                playMuralVideo();
            }, { passive: true });
        }

        document.body.addEventListener('click', playMuralVideo, { once: true });

        if (window.Hands && window.Camera) {
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
            hands.onResults(onResults);

            const cameraUtils = new Camera(inputVideoElement, {
                onFrame: async () => { await hands.send({ image: inputVideoElement }); },
                width: 640, height: 480
            });

            cameraUtils.start().catch(err => {
                console.error(err);
                enablePointerFallback();
            });
        } else {
            enablePointerFallback();
        }
    </script>
</body>
</html>
