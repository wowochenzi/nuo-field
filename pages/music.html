<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>傩场 NuoField | 傩乐入耳</title>
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/effects.css" />
    <link rel="stylesheet" href="../css/pages.css" />
  </head>
  <body data-root=".." data-page="music">
    <canvas id="particleCanvas" class="particle-canvas" aria-hidden="true"></canvas>
    <div class="site-shell">
      <header class="site-header">
        <a class="brand" href="../home.html"><span class="brand-mark"></span><span>傩场</span></a>
        <nav class="site-nav" aria-label="主流程导航">
          <a href="origin.html" data-route="origin">溯源</a>
          <a href="three-senses.html" data-route="three-senses">三感</a>
          <a href="masks.html" data-route="masks">诸神</a>
          <a href="choose-mask.html" data-route="choose-mask">择面</a>
          <a href="craft-mask.html" data-route="craft-mask">制面</a>
          <a href="wear-mask.html" data-route="wear-mask">戴面</a>
          <a href="gestures.html" data-route="gestures">手诀</a>
          <a href="instruments.html" data-route="instruments">法器</a>
          <a href="music.html" data-route="music">傩乐</a>
          <a href="summary.html" data-route="summary">传承</a>
        </nav>
      </header>

      <main class="page-main music-page">
        <div class="page-title-row">
          <div>
            <h1>傩乐入耳</h1>
          </div>
        </div>

        <section class="music-figma-board" aria-label="傩乐入耳">
          <div class="music-title-band">
            <h2>选择乐器，聆听傩音</h2>
            <p id="musicNowTitle">点击任一乐器，听见鼓、锣、唢呐、钹如何把仪式推入场中。</p>
          </div>

          <section class="music-instrument-grid" id="musicInstrumentGrid" aria-label="乐器选择"></section>

          <footer class="music-flow-footer">
            <div class="music-now" aria-live="polite">
              <span id="musicNowSymbol">声</span>
              <p>已点亮 <strong id="musicPlayedCount">0</strong> / 4 声</p>
            </div>
            <button class="ritual-button primary is-disabled" type="button" id="enterSummary">进入终章</button>
          </footer>
        </section>
      </main>
    </div>

    <button class="audio-toggle" type="button" aria-label="背景音乐开关">乐</button>
    <script src="../js/data.js"></script>
    <script src="../js/state.js"></script>
    <script src="../js/router.js"></script>
    <script src="../js/audio.js"></script>
    <script src="../js/cursor-particles.js"></script>
    <script src="../js/app.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "../assets/vendor/three/build/three.module.js",
          "three/addons/": "../assets/vendor/three/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="../js/page-music.js"></script>
  </body>
</html>
